<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>탄소를 감축하는 자전거 챌린지 season2</title>
    <meta
      name="description"
      content="카카오맵 기반 자전거 챌린지 season2 메인 홈페이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="홈으로 이동">
          <span class="brand-title">탄소를 감축하는 자전거 챌린지</span>
          <span class="brand-season">season2</span>
        </a>

        <nav class="topnav" aria-label="상단 메뉴">
          <button class="topnav-button is-active" type="button" data-top-menu="intro">
            챌린지 소개
          </button>
          <button class="topnav-button" type="button" data-top-menu="guide">
            참여 가이드
          </button>
          <button class="topnav-button" type="button" data-top-menu="operation">
            운영 메뉴
          </button>
          <button class="topnav-button" type="button" data-top-menu="support">
            지원 센터
          </button>
        </nav>
      </header>

      <aside class="side-rail" aria-label="좌측 메뉴">
        <button class="rail-button is-active" type="button" data-side-menu="course">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 18h14"></path>
              <path d="M7 14h10"></path>
              <path d="M9 10h6"></path>
              <path d="M11 6h2"></path>
            </svg>
          </span>
          <span>챌린지 코스</span>
        </button>
        <button class="rail-button" type="button" data-side-menu="checkpoint">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 20s6-5.2 6-10a6 6 0 1 0-12 0c0 4.8 6 10 6 10Z"
              ></path>
              <circle cx="12" cy="10" r="2.5"></circle>
            </svg>
          </span>
          <span>인증 스팟</span>
        </button>
        <button class="rail-button" type="button" data-side-menu="ranking">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 19h8"></path>
              <path d="M10 15h4"></path>
              <path d="M12 5v10"></path>
              <path d="M8 9l4-4 4 4"></path>
            </svg>
          </span>
          <span>랭킹 보드</span>
        </button>
        <button class="rail-button" type="button" data-side-menu="carbon">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 20c4 0 7-3.1 7-7 0-5-7-10-7-10S5 8 5 13c0 3.9 3 7 7 7Z"></path>
              <path d="M12 7c-1.5 2.1-2 4.1-2 6"></path>
            </svg>
          </span>
          <span>탄소 절감</span>
        </button>
      </aside>

      <main class="map-stage">
        <div id="map" aria-label="카카오맵 자전거 챌린지 지도"></div>

        <section class="submenu-panel top-panel" aria-live="polite">
          <div class="panel-head">
            <p class="panel-kicker">상단 메뉴</p>
            <h1 id="topPanelTitle">챌린지 소개</h1>
            <button class="panel-close" type="button" data-close-panel="top" aria-label="상단 메뉴 닫기">
              ×
            </button>
          </div>
          <div class="submenu-list" id="topPanelList"></div>
          <div class="submenu-detail" id="topPanelDetail"></div>
        </section>

        <section class="submenu-panel side-panel" aria-live="polite">
          <div class="panel-head">
            <p class="panel-kicker">좌측 메뉴</p>
            <h2 id="sidePanelTitle">챌린지 코스</h2>
            <button class="panel-close" type="button" data-close-panel="side" aria-label="좌측 메뉴 닫기">
              ×
            </button>
          </div>
          <div class="submenu-list" id="sidePanelList"></div>
          <div class="submenu-detail" id="sidePanelDetail"></div>
        </section>

        <div class="map-overlay status-chip" id="mapStatus">
          카카오맵 로딩 준비 중
        </div>

        <div class="map-overlay map-type-toggle" aria-label="지도 타입 선택">
          <button class="map-type-button is-active" type="button" data-map-type="ROADMAP">
            일반지도
          </button>
          <button class="map-type-button" type="button" data-map-type="SKYVIEW">
            위성지도
          </button>
        </div>

        <div class="map-overlay key-notice" id="keyNotice" hidden>
          <strong>카카오맵 또는 항공사진을 불러오지 못했습니다.</strong>
          <span><a href="./config.js">config.js</a>의 <code>window.KAKAO_MAP_APPKEY</code> 값이 맞는지 확인하고, 카카오 디벨로퍼스 Web 플랫폼에 현재 접속 도메인이 등록되어 있는지도 함께 확인해주세요.</span>
        </div>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
