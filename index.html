<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>탄소를 감축하는 자전거 챌린지 season2</title>
    <meta
      name="description"
      content="카카오맵 기반 자전거 챌린지 season2 메인 홈페이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button class="home-intro" id="homeIntro" type="button" aria-label="메인 이미지 닫기">
      <img src="./img/main.png" alt="탄소를 감축하는 자전거 챌린지 season2 메인 이미지" />
      <span>화면을 클릭하면 지도로 이동합니다</span>
    </button>

    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="홈으로 이동">
          <span class="brand-title">탄소를 감축하는 자전거 챌린지</span>
          <span class="brand-season">season2</span>
        </a>

        <nav class="topnav" aria-label="상단 메뉴">
          <button class="topnav-button is-active" type="button" data-top-menu="intro">
            챌린지 소개
          </button>
          <button class="topnav-button" type="button" data-top-menu="method">
            참여방법
          </button>
          <button class="topnav-button" type="button" data-top-menu="event">
            이벤트
          </button>
          <button class="topnav-button" type="button" data-top-menu="community">
            커뮤니티
          </button>
          <button class="topnav-button" type="button" data-top-menu="login">
            로그인
          </button>
        </nav>
      </header>

      <aside class="side-rail" aria-label="좌측 메뉴">
        <button class="rail-button" type="button" data-side-menu="course">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="m16 16 4 4"></path>
            </svg>
          </span>
          <span>코스검색</span>
        </button>
        <button class="rail-button is-active" type="button" data-side-menu="treasure">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 6.5 9 4l6 2.5 5-2.5v13.5l-5 2.5-6-2.5-5 2.5V6.5Z"></path>
              <path d="M9 4v13.5"></path>
              <path d="M15 6.5V20"></path>
              <path d="M11.5 11.5h1"></path>
            </svg>
          </span>
          <span>보물찾기</span>
        </button>
        <button class="rail-button" type="button" data-side-menu="certify">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 20s6-5.2 6-10a6 6 0 1 0-12 0c0 4.8 6 10 6 10Z"
              ></path>
              <circle cx="12" cy="10" r="2.5"></circle>
            </svg>
          </span>
          <span>인증하기</span>
        </button>
        <button class="rail-button" type="button" data-side-menu="carbon">
          <span class="rail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 20c4 0 7-3.1 7-7 0-5-7-10-7-10S5 8 5 13c0 3.9 3 7 7 7Z"></path>
              <path d="M12 7c-1.5 2.1-2 4.1-2 6"></path>
            </svg>
          </span>
          <span>탄소 절감</span>
        </button>
      </aside>

      <main class="map-stage">
        <div id="map" aria-label="카카오맵 자전거 챌린지 지도"></div>

        <section class="submenu-panel top-panel" aria-live="polite">
          <div class="panel-head">
            <p class="panel-kicker">상단 메뉴</p>
            <h1 id="topPanelTitle">챌린지 소개</h1>
            <button class="panel-close" type="button" data-close-panel="top" aria-label="상단 메뉴 닫기">
              ×
            </button>
          </div>
          <div class="submenu-list" id="topPanelList"></div>
          <div class="submenu-detail" id="topPanelDetail"></div>
        </section>

        <section class="submenu-panel side-panel" aria-live="polite">
          <div class="panel-head">
            <p class="panel-kicker">좌측 메뉴</p>
            <h2 id="sidePanelTitle">보물찾기</h2>
            <button class="panel-close" type="button" data-close-panel="side" aria-label="좌측 메뉴 닫기">
              ×
            </button>
          </div>
          <section class="route-finder route-finder--panel" id="routeFinder" aria-label="코스찾기">
            <div class="route-finder-head">
              <p class="route-finder-title">코스찾기</p>
              <button class="route-chip" type="button" id="routeLocateButton">현재위치</button>
            </div>
            <form class="route-search-form" id="routeSearchForm">
              <label class="route-search-input">
                <span class="route-search-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="6.5"></circle>
                    <path d="m16 16 4 4"></path>
                  </svg>
                </span>
                <input
                  id="routeSearchInput"
                  type="text"
                  placeholder="도착 장소 이름을 입력하세요"
                  autocomplete="off"
                />
              </label>
              <button class="route-search-submit" type="submit">검색</button>
            </form>
            <div class="route-search-meta" id="routeSearchMeta">
              현재 위치에서 찾고 싶은 장소를 입력하면 자전거 길찾기를 열 수 있습니다.
            </div>
            <div class="route-search-actions" id="routeSearchActions" hidden>
              <button class="route-open-button" id="routeOpenButton" type="button">
                자전거 길찾기 열기
              </button>
            </div>
          </section>
          <div class="submenu-list" id="sidePanelList"></div>
          <div class="submenu-detail" id="sidePanelDetail"></div>
        </section>

        <div class="map-overlay status-chip" id="mapStatus" hidden aria-live="polite"></div>

        <div class="map-overlay place-card" id="placeCard" hidden aria-live="polite"></div>

        <div class="map-overlay map-type-toggle" aria-label="지도 타입 선택">
          <button class="map-type-button is-active" type="button" data-map-type="ROADMAP">
            <span class="map-type-button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 6.5 9.4 4l5.2 2.2L20 3.8v13.7l-5.4 2.5-5.2-2.2L4 20.2Z"></path>
                <path d="M9.4 4v13.8"></path>
                <path d="M14.6 6.2V20"></path>
              </svg>
            </span>
            <span class="map-type-button-label">지도</span>
          </button>
          <button class="map-type-button" type="button" data-map-type="SKYVIEW">
            <span class="map-type-button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="4.5" width="16" height="11" rx="3"></rect>
                <path d="M7 15.5 10.5 11l3 2.7 2.2-1.8L20 15.5"></path>
                <circle cx="9" cy="8.5" r="1.2"></circle>
              </svg>
            </span>
            <span class="map-type-button-label">위성</span>
          </button>
        </div>

        <div class="map-overlay key-notice" id="keyNotice" hidden>
          <strong>카카오맵 또는 항공사진을 불러오지 못했습니다.</strong>
          <span><a href="./config.js">config.js</a>의 <code>window.KAKAO_MAP_APPKEY</code> 값이 맞는지 확인하고, 카카오 디벨로퍼스 Web 플랫폼에 현재 접속 도메인이 등록되어 있는지도 함께 확인해주세요.</span>
        </div>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
